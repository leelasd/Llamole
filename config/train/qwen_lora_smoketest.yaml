### model
model_name_or_path: Qwen/Qwen2-7B-Instruct
new_special_tokens: <design_start>,<design_end>,<design_body>,<molecule>,<retro_start>,<retro_end>,<retro_body>,<rollback_start>,<rollback_end>
graph_decoder_path: saves/graph_decoder
graph_encoder_path: saves/graph_encoder
graph_predictor_path: saves/graph_predictor
graph_lm_connector_path: null
### method
stage: mmsft
do_train: true
finetuning_type: lora
lora_target: all
flash_attn: disabled
learned_query_size: 8
### dataset
dataset: molqa_train_examples   # 61 examples — smoke test only
template: qwen
cutoff_len: 512                  # shorter sequences to reduce memory
overwrite_cache: true
preprocessing_num_workers: 4
### output
output_dir: saves/Qwen2-7B-Instruct-Adapter-smoketest
logging_steps: 5
save_steps: 50
plot_loss: true
overwrite_output_dir: true
### train
per_device_train_batch_size: 2   # conservative for smoke test
gradient_accumulation_steps: 2
learning_rate: 1.0e-4
num_train_epochs: 1.0            # single epoch
lr_scheduler_type: cosine
warmup_ratio: 0.1
ddp_timeout: 180000000
bf16: true
pure_bf16: true
loss_weight_retro: 1
loss_weight_design: 1
loss_weight_lm: 1
### eval
val_size: 0.1
per_device_eval_batch_size: 2
eval_strategy: steps
eval_steps: 50
### specify if connected to wandb
report_to: 'none'
